# .github/workflows/ci.yml
#
# CI/CD pipeline for LexiAssist.
# Triggers on every push and pull request to the main branch.
# Runs linting, tests, and builds + pushes the Docker image.

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Downloads your repository code into the runner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 black

      - name: Run flake8
        # Check for syntax errors and undefined names only.
        # E9 = syntax errors, F63 = invalid escape sequences,
        # F7 = syntax errors in annotations, F82 = undefined names
        run: flake8 backend/ frontend/ evaluation/ --select=E9,F63,F7,F82 --show-source

      - name: Check black formatting
        # --check means black reports differences without changing files.
        # --diff shows exactly what would change.
        run: black --check --diff backend/ frontend/ evaluation/

  # ── Job 2: Test ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    # 'needs: lint' means this job only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create vectorstore directory
        run: mkdir -p vectorstore data/raw data/processed

      - name: Run ingestion to populate data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python backend/ingest.py

      - name: Build vector store
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python build_vectorstore.py

      - name: Run pytest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m pytest tests/test_api.py -v --tb=short --import-mode=importlib

  # ── Job 3: Build & Push Docker Image ────────────────────────
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only push the image on pushes to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx is an extended Docker build tool that supports
        # multi-platform builds and better caching

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lexiassist
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Cache layers from the previous build to speed up future builds
          cache-from: type=gha
          cache-to: type=gha,mode=max